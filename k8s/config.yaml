apiVersion: v1
kind: Namespace
metadata:
  name: llm-logger
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: llm-logger
type: Opaque
stringData:
  # Base64 encode these in real life or use a secret manager
  OPENAI_API_KEY: "your-openai-key"
  ANTHROPIC_API_KEY: "your-anthropic-key"
  GOOGLE_API_KEY: "your-google-key"
  OPENROUTER_API_KEY: "your-openrouter-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: llm-logger
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres_password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: llm-logger
data:
  POSTGRES_DB: "inference_logger"
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres_password@postgres:5432/inference_logger"
  REDIS_URL: "redis://redis:6379/0"
  DEFAULT_MODEL: "gpt-4.1"
  DEFAULT_PROVIDER: "openai"
  CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
  NEXT_PUBLIC_API_URL: "http://backend-svc:8000"
